<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Yuna Bernard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f2ed;
    --gray-arch: #b8b5b0;
    --gray-light: #d4d1cc;
    --black: #1a1a1a;
    --glass: rgba(180,177,172,0.85);
  }

  body {
    background: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 12px; height: 12px;
    background: var(--black);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, width 0.3s, height 0.3s;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid var(--black);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease, width 0.3s, height 0.3s, opacity 0.3s;
    opacity: 0.5;
  }

  /* Decorative clouds */
  .cloud {
    position: absolute;
    opacity: 0.55;
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }
  .cloud svg { fill: #dedad4; }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  /* Decorative trees/foliage */
  .foliage {
    position: absolute;
    pointer-events: none;
    opacity: 0.25;
    animation: sway 6s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); transform-origin: bottom center; }
    50% { transform: rotate(2deg); transform-origin: bottom center; }
  }

  /* Main layout */
  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 40px 40px;
  }

  /* Building / facade */
  .facade {
    position: relative;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 28px 24px;
    max-width: 1100px;
    width: 100%;
    padding: 20px;
  }

  /* Each arch window */
  .arch {
    position: relative;
    aspect-ratio: 3/4;
    cursor: none;
    overflow: visible;
  }

  .arch-inner {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50% 50% 0 0 / 40% 40% 0 0;
    background: var(--gray-arch);
    overflow: hidden;
    transition: background 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.12), 0 4px 20px rgba(0,0,0,0.08);
  }

  .arch:hover .arch-inner {
    background: #a8a5a0;
    transform: translateY(-6px) scale(1.03);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.15), 0 12px 40px rgba(0,0,0,0.18);
  }

  /* Window panes / grid lines */
  .arch-panes {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .arch-panes::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 20%;
    bottom: 0;
    width: 1.5px;
    background: rgba(255,255,255,0.35);
    transform: translateX(-50%);
  }
  .arch-panes::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 55%;
    height: 1.5px;
    background: rgba(255,255,255,0.35);
  }

  /* Silhouette containers */
  .silhouette {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .arch:hover .silhouette,
  .arch.active .silhouette { opacity: 1; }
  .arch.has-silhouette .silhouette { opacity: 1; }

  .silhouette svg {
    fill: var(--black);
    width: 100%;
    height: auto;
    filter: drop-shadow(0 -2px 6px rgba(0,0,0,0.2));
  }

  /* Label tooltip */
  .arch-label {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--black);
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.3s ease, bottom 0.3s ease;
    text-transform: uppercase;
  }
  .arch:hover .arch-label {
    opacity: 0.7;
    bottom: -32px;
  }

  /* Title */
  .portfolio-title {
    margin-top: 56px;
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 3vw, 32px);
    font-weight: 300;
    letter-spacing: 0.35em;
    color: var(--black);
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.8s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Staggered arch entrance */
  .arch {
    opacity: 0;
    animation: archReveal 0.7s ease forwards;
  }
  .arch:nth-child(1)  { animation-delay: 0.05s; }
  .arch:nth-child(2)  { animation-delay: 0.10s; }
  .arch:nth-child(3)  { animation-delay: 0.15s; }
  .arch:nth-child(4)  { animation-delay: 0.20s; }
  .arch:nth-child(5)  { animation-delay: 0.25s; }
  .arch:nth-child(6)  { animation-delay: 0.30s; }
  .arch:nth-child(7)  { animation-delay: 0.35s; }
  .arch:nth-child(8)  { animation-delay: 0.40s; }
  .arch:nth-child(9)  { animation-delay: 0.45s; }
  .arch:nth-child(10) { animation-delay: 0.50s; }
  .arch:nth-child(11) { animation-delay: 0.55s; }
  .arch:nth-child(12) { animation-delay: 0.60s; }
  .arch:nth-child(13) { animation-delay: 0.65s; }
  .arch:nth-child(14) { animation-delay: 0.70s; }
  .arch:nth-child(15) { animation-delay: 0.75s; }
  .arch:nth-child(16) { animation-delay: 0.80s; }
  .arch:nth-child(17) { animation-delay: 0.85s; }
  .arch:nth-child(18) { animation-delay: 0.90s; }

  @keyframes archReveal {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .facade {
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 18px 16px;
    }
  }
  @media (max-width: 480px) {
    .facade {
      grid-template-columns: repeat(2, 1fr);
      gap: 14px 12px;
    }
  }
</style>
</head>

        <div class="arch-label">Carnets &amp; Maquettes</div>
      </div>
    </div>

  </div>

  <h1 class="portfolio-title">Portfolio Yuna Bernard</h1>

  <!-- Nav contact -->
  <a href="contact.html" style="
    margin-top: 24px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gray-arch);
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 1.2s ease 1.2s forwards;
    transition: color 0.3s;
  " onmouseover="this.style.color='var(--black)'" onmouseout="this.style.color='var(--gray-arch)'">Contact &amp; Alternance →</a>

</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function animateCursor() {
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  // Hover on arches - grow cursor ring
  document.querySelectorAll('.arch').forEach(arch => {
    arch.addEventListener('mouseenter', () => {
      cursor.style.width = '6px';
      cursor.style.height = '6px';
      ring.style.width = '55px';
      ring.style.height = '55px';
      ring.style.opacity = '0.8';
    });
    arch.addEventListener('mouseleave', () => {
      cursor.style.width = '12px';
      cursor.style.height = '12px';
      ring.style.width = '36px';
      ring.style.height = '36px';
      ring.style.opacity = '0.5';
    });
  });
</script>
</body>
</html>
